<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.I.K.I. CORE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-light: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            background-color: var(--panel-bg);
            border-right: 1px solid #334155;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-chat {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .right-dashboard {
            background-color: var(--panel-bg);
            border-left: 1px solid #334155;
            height: 100vh;
            overflow-y: auto;
        }
        .chat-box {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
        }
        .message-user {
            background-color: #2563eb;
            color: white;
            border-radius: 12px 12px 0 12px;
            padding: 12px 16px;
            margin-bottom: 15px;
            max-width: 80%;
            margin-left: auto;
        }
        .message-niki {
            background-color: #334155;
            color: var(--text-light);
            border-radius: 12px 12px 12px 0;
            padding: 12px 16px;
            margin-bottom: 15px;
            max-width: 85%;
        }
        .monologue-box {
            background-color: #0f172a;
            border-left: 3px solid var(--accent-blue);
            color: #7dd3fc;
            font-size: 0.85rem;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 4px;
            white-space: pre-wrap;
        }
        .ws-item {
            cursor: pointer;
            padding: 10px 15px;
            border-radius: 6px;
            transition: all 0.2s;
            margin-bottom: 4px;
            color: var(--text-dim);
        }
        .ws-item:hover, .ws-item.active {
            background-color: var(--accent-blue);
            color: white;
        }
        .dash-card {
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 15px;
        }
        .dash-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--accent-blue);
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        .badge-fact {
            background-color: #059669;
            color: white;
            font-size: 0.75rem;
        }
    </style>
</head>
<body>
<div class="container-fluid h-100 p-0">
    <div class="row g-0 h-100">
        
        <!-- ЛЯВО МЕНЮ: Работни пространства & Файлове -->
        <div class="col-md-2 sidebar p-3">
            <h5 class="fw-bold mb-3 text-primary"><i class="fa-solid fa-brain me-2"></i>N.I.K.I. CORE</h5>
            
            <div class="dash-title">Проекти (Workspaces)</div>
            <div id="workspace-list" class="flex-grow-1 overflow-y-auto mb-3"></div>

            <button class="btn btn-outline-primary btn-sm w-100 mb-3" onclick="createNewWorkspace()">
                <i class="fa-solid fa-plus me-1"></i> Нов Проект
            </button>

            <hr class="border-secondary">

            <div class="dash-title">Качване на Документ</div>
            <form id="upload-form" class="mb-2">
                <input type="file" id="file-input" class="form-control form-control-sm mb-2 bg-dark text-light border-secondary" required>
                <button type="submit" class="btn btn-success btn-sm w-100">
                    <i class="fa-solid fa-cloud-arrow-up me-1"></i> Синхронизирай
                </button>
            </form>
        </div>

        <!-- ЦЕНТРАЛНА ЗОНА: Чат -->
        <div class="col-md-7 main-chat">
            <div class="p-3 border-bottom border-secondary d-flex justify-content-between align-items-center">
                <span>Активно пространство: <strong id="current-ws-display" class="text-info">GENERAL</strong></span>
                <span class="badge bg-success">ROOT Access Active</span>
            </div>

            <div id="chat-box" class="chat-box"></div>

            <div class="p-3 border-top border-secondary">
                <div class="input-group">
                    <input type="text" id="user-input" class="form-control bg-dark text-light border-secondary" placeholder="Задай въпрос, започни с 'факт:' или 'задача:'...">
                    <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane me-1"></i> Изпрати
                    </button>
                </div>
            </div>
        </div>

        <!-- ДЯСНО МЕНЮ: Табло за контрол (Dashboard) -->
        <div class="col-md-3 right-dashboard p-3">
            <h6 class="fw-bold mb-3 text-warning"><i class="fa-solid fa-gauge-high me-2"></i>Табло за контрол</h6>

            <!-- Секция Факти -->
            <div class="dash-card">
                <div class="dash-title"><i class="fa-solid fa-certificate me-1"></i> Записани Факти (+100)</div>
                <div id="facts-list" class="small text-light">Няма регистрирани факти.</div>
            </div>

            <!-- Секция Задачи -->
            <div class="dash-card">
                <div class="dash-title"><i class="fa-solid fa-list-check me-1"></i> Активни Задачи</div>
                <div id="tasks-list" class="small text-light">Няма активни задачи.</div>
            </div>

            <!-- Секция Библиотека -->
            <div class="dash-card">
                <div class="dash-title"><i class="fa-solid fa-folder-open me-1"></i> Файлове в Библиотеката</div>
                <div id="files-list" class="small text-light">Няма качени файлове.</div>
            </div>
        </div>

    </div>
</div>

<script>
    let currentWorkspace = "general";

    async function loadWorkspaces() {
        const res = await fetch("/workspaces");
        const data = await res.json();
        const list = document.getElementById("workspace-list");
        list.innerHTML = "";
        data.workspaces.forEach(ws => {
            const div = document.createElement("div");
            div.className = `ws-item ${ws === currentWorkspace ? 'active' : ''}`;
            div.innerText = ws.toUpperCase();
            div.onclick = () => switchWorkspace(ws);
            list.appendChild(div);
        });
    }

    function switchWorkspace(ws) {
        currentWorkspace = ws;
        document.getElementById("current-ws-display").innerText = ws.toUpperCase();
        loadWorkspaces();
        loadWorkspaceFiles();
    }

    async function loadWorkspaceFiles() {
        const res = await fetch(`/workspace_files/${currentWorkspace}`);
        const data = await res.json();
        const filesDiv = document.getElementById("files-list");
        if (data.files.length > 0) {
            filesDiv.innerHTML = data.files.map(f => `<div class="mb-1"><i class="fa-regular fa-file-code me-1 text-info"></i>${f}</div>`).join("");
        } else {
            filesDiv.innerText = "Няма качени файлове.";
        }
    }

    async function createNewWorkspace() {
        const name = prompt("Въведете име на новия проект (Workspace):");
        if (name) {
            const res = await fetch("/workspaces", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({name: name})
            });
            const data = await res.json();
            if (data.status === "success") {
                switchWorkspace(data.workspace);
            }
        }
    }

    async function sendMessage() {
        const input = document.getElementById("user-input");
        const msg = input.value.trim();
        if (!msg) return;

        const chatBox = document.getElementById("chat-box");
        chatBox.innerHTML += `<div class="message-user">${msg}</div>`;
        input.value = "";
        chatBox.scrollTop = chatBox.scrollHeight;

        const res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: msg, workspace: currentWorkspace})
        });

        const data = await res.json();
        
        let nikiMsg = `<div class="message-niki">`;
        if (data.monologue) {
            nikiMsg += `<div class="monologue-box"><i class="fa-solid fa-brain me-1"></i> <strong>Мисловен процес:</strong>\n${data.monologue}</div>`;
        }
        nikiMsg += `<div>${data.reply}</div></div>`;

        chatBox.innerHTML += nikiMsg;
        chatBox.scrollTop = chatBox.scrollHeight;
        
        loadWorkspaceFiles();
    }

    document.getElementById("upload-form").onsubmit = async (e) => {
        e.preventDefault();
        const fileInput = document.getElementById("file-input");
        if (!fileInput.files[0]) return;

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);
        formData.append("workspace", currentWorkspace);

        const res = await fetch("/upload", { method: "POST", body: formData });
        const data = await res.json();
        alert(data.message);
        loadWorkspaceFiles();
    };

    loadWorkspaces();
    loadWorkspaceFiles();
</script>
</body>
</html>
