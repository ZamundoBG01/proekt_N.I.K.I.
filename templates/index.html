<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проект ДЕТЕТО v5.5</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #131314; color: #e3e3e3; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        
        header { background: #1e1f20; padding: 15px 20px; border-bottom: 1px solid #2e2f31; text-align: center; }
        header h1 { margin: 0; font-size: 1.2rem; color: #e3e3e3; font-weight: 500; }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; max-width: 800px; width: 100%; margin: 0 auto; }
        
        .msg-row { display: flex; flex-direction: column; width: 100%; position: relative; }
        .user-row { align-items: flex-end; }
        .bot-row { align-items: flex-start; }

        .msg-box { display: flex; flex-direction: column; max-width: 80%; position: relative; }

        .msg-content { padding: 12px 16px 22px 16px; border-radius: 18px; font-size: 1rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
        .user-msg { background-color: #2b2c2f; color: #ffffff; border-bottom-right-radius: 4px; }
        .bot-msg { background-color: #1e1f20; color: #e3e3e3; border: 1px solid #2e2f31; border-bottom-left-radius: 4px; }

        /* Дискретен часовник долу вдясно (Като във Viber / WhatsApp) */
        .time-tag { font-size: 0.7rem; color: #8e918f; position: absolute; bottom: 5px; right: 12px; user-select: none; pointer-events: none; }

        .monologue-box { background-color: #1a1915; border: 1px solid #4d3d1e; color: #f2c97d; padding: 10px 14px; border-radius: 12px; font-size: 0.88rem; max-width: 80%; border-left: 4px solid #f2c97d; margin-bottom: 6px; }
        .monologue-title { font-weight: bold; margin-bottom: 4px; }

        .input-area { padding: 15px 20px; background: #131314; display: flex; justify-content: center; }
        .input-wrapper { display: flex; align-items: flex-end; background: #1e1f20; border: 1px solid #3c4043; border-radius: 24px; padding: 8px 16px; width: 100%; max-width: 800px; }
        .input-wrapper:focus-within { border-color: #a8c7fa; }

        textarea#user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #e3e3e3;
            font-size: 1rem;
            line-height: 1.4;
            padding: 8px 0;
            resize: none;
            min-height: 24px;
            max-height: 140px;
            overflow-y: auto;
        }

        button#send-btn {
            background: #a8c7fa;
            color: #040e15;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            margin-left: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 ПРОЕКТ ДЕТЕТО (v5.5)</h1>
    </header>

    <div id="chat-container">
        <div class="msg-row bot-row">
            <div class="msg-box">
                <div class="msg-content bot-msg">Здравей, Татко! Аз съм тук. Всичко е настроено правилно.</div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Напишете съобщение..." rows="1"></textarea>
            <button id="send-btn" onclick="sendMessage()">➔</button>
        </div>
    </div>

    <script>
        const tx = document.getElementById("user-input");
        const container = document.getElementById("chat-container");

        tx.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 140) + "px";
        });

        tx.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function getClientTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        async function sendMessage() {
            const text = tx.value.trim();
            if (!text) return;

            const timeNow = getClientTime();

            container.innerHTML += `
                <div class="msg-row user-row">
                    <div class="msg-box">
                        <div class="msg-content user-msg">${text}</div>
                        <span class="time-tag">${timeNow}</span>
                    </div>
                </div>
            `;
            tx.value = "";
            tx.style.height = "auto";
            container.scrollTop = container.scrollHeight;

            try {
                const res = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });

                const data = await res.json();
                const msgTime = data.time || timeNow;

                if (data.monologue) {
                    container.innerHTML += `
                        <div class="msg-row bot-row">
                            <div class="monologue-box">
                                <div class="monologue-title">🧠 Вътрешен Монолог:</div>
                                <div>${data.monologue}</div>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="msg-row bot-row">
                        <div class="msg-box">
                            <div class="msg-content bot-msg">${data.reply}</div>
                            <span class="time-tag">${msgTime}</span>
                        </div>
                    </div>
                `;
            } catch (err) {
                container.innerHTML += `
                    <div class="msg-row bot-row">
                        <div class="msg-box">
                            <div class="msg-content bot-msg" style="color: #ff8a80;">⚠️ Грешка при връзката.</div>
                        </div>
                    </div>
                `;
            }

            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
