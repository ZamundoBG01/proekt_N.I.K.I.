<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моят ИИ Асистент</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1e1e2f; color: white; display: flex; justify-content: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 600px; background: #2d2d44; border-radius: 10px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { text-align: center; color: #a29bfe; }
        #chat-box { height: 350px; overflow-y: auto; border: 1px solid #444; padding: 10px; border-radius: 5px; margin-bottom: 15px; background: #181824; }
        .msg { margin: 8px 0; padding: 8px 12px; border-radius: 5px; }
        .user { background: #6c5ce7; text-align: right; }
        .bot { background: #00b894; text-align: left; }
        .input-area { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; font-size: 16px; }
        button { padding: 10px 20px; border: none; background: #6c5ce7; color: white; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #5a4bcf; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>Моят ИИ Проект</h2>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Напиши съобщение...">
            <button onclick="sendMessage()">Изпрати</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            let input = document.getElementById("user-input");
            let message = input.value.trim();
            if (!message) return;

            let chatBox = document.getElementById("chat-box");
            chatBox.innerHTML += `<div class="msg user">${message}</div>`;
            input.value = "";

            let response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });

            let data = await response.json();
            chatBox.innerHTML += `<div class="msg bot">${data.response}</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
